<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Skiller</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="scripts/scripts.js"></script>
</head>
<body>
    <div class="cabecera">                
        <img class="logo" src="imagenes/musica skilller3.png" alt="Logo">
        <div id="nombreCabecera">Music Skiller</div>
        <div class="menu">
            <div>INICIO</div>
            <div>CONOCENOS</div>
            <div>SERVICIOS</div>
            <div>PORFOLIO</div> 
            <div id="textoGrande">SOLICITA PRESUPUESTO</div>           
        </div>
        <div class="menu2">
            <div>Log in</div>
            <img id="login" src="imagenes/login.png" alt="Login">                      
        </div>
    </div>
    <div class="tituloSelector">
        <img src="imagenes/trombon.png" alt="">
        <div id="instrumento">Trombón</div>
    </div>    
    <div class="selector ejercicio">        
        <div id="nivel">
            <div id="principiante">Principiante</div>
            <div id="medio">Medio</div>
            <div id="avanzado">Avanzado</div>
        </div>
        <div id="ejercicios">
            <div>Escalas</div>
            <div>Arpegios</div>
            <div>Picado</div>
            <div>Ligado</div>
            <div>Trino</div>
            <div>Agudos</div>
            <div>Graves</div>
            <div>Respiración</div>
        </div>
    </div>    
    <script>
        document.getElementById('registroForm').addEventListener('submit', function(event) {
            event.preventDefault();
            var formData = new FormData(this);

            fetch('new_user.php', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    var textoDiv = document.getElementById('texto');
                    if (data.status === 'success') {
                        textoDiv.textContent = data.message;
                    } else {
                        textoDiv.textContent = data.message;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        });
    </script>
</body>
</html>
